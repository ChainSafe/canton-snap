name: Lint & Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Snap
        run: npm run build

      - name: Run Crypto Cross-Validation Tests
        run: npm test

      - name: Run Snap Integration Tests
        run: npm run test:snap
