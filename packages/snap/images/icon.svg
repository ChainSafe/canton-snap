<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#131842"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7d046"/>
      <stop offset="100%" stop-color="#e8a317"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4da3ff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Outer geometric hexagon frame (glass-like) -->
  <polygon
    points="256,72 412,144 412,368 256,440 100,368 100,144"
    fill="url(#glass)"
    stroke="url(#glow2)"
    stroke-width="2.5"
    opacity="0.6"
  />

  <!-- Inner hexagon accent -->
  <polygon
    points="256,112 380,172 380,340 256,400 132,340 132,172"
    fill="none"
    stroke="url(#glow2)"
    stroke-width="1"
    opacity="0.3"
  />

  <!-- Stylized "C" arc — Canton/ChainSafe — gold gradient -->
  <g filter="url(#glowFilter)">
    <path
      d="M 310,168 A 108,108 0 1 0 310,344"
      fill="none"
      stroke="url(#glow1)"
      stroke-width="28"
      stroke-linecap="round"
    />
  </g>

  <!-- Key symbol inside the C — representing signing/crypto -->
  <g filter="url(#softGlow)" transform="translate(256,256)">
    <!-- Key head (circle) -->
    <circle cx="16" cy="-24" r="28" fill="none" stroke="url(#glow2)" stroke-width="8"/>
    <!-- Key shaft -->
    <line x1="16" y1="4" x2="16" y2="72" stroke="url(#glow2)" stroke-width="8" stroke-linecap="round"/>
    <!-- Key teeth -->
    <line x1="16" y1="52" x2="36" y2="52" stroke="url(#glow2)" stroke-width="7" stroke-linecap="round"/>
    <line x1="16" y1="68" x2="32" y2="68" stroke="url(#glow2)" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Network nodes — small dots at hexagon vertices with connections -->
  <g opacity="0.5">
    <circle cx="256" cy="72" r="5" fill="#f7d046"/>
    <circle cx="412" cy="144" r="5" fill="#4da3ff"/>
    <circle cx="412" cy="368" r="5" fill="#f7d046"/>
    <circle cx="256" cy="440" r="5" fill="#4da3ff"/>
    <circle cx="100" cy="368" r="5" fill="#f7d046"/>
    <circle cx="100" cy="144" r="5" fill="#4da3ff"/>
  </g>

  <!-- Corner accent lines -->
  <g opacity="0.15" stroke="#f7d046" stroke-width="2">
    <line x1="40" y1="40" x2="90" y2="40"/>
    <line x1="40" y1="40" x2="40" y2="90"/>
    <line x1="472" y1="472" x2="422" y2="472"/>
    <line x1="472" y1="472" x2="472" y2="422"/>
  </g>
</svg>
