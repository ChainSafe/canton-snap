<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="orbBrand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4a4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00d4a4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#12141f"/>
    </linearGradient>
    <linearGradient id="ctaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0b8"/>
      <stop offset="100%" stop-color="#00d4a4"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="#0a0b14"/>
  <circle cx="720" cy="560" r="420" fill="url(#orbBrand)"/>

  <!-- ═══ Top bar ═══ -->
  <g transform="translate(96, 40)">
    <rect width="32" height="32" rx="8" fill="url(#ctaFill)"/>
    <path d="M10 16 L14 20 L22 12" stroke="#0a0b14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="48" y="16" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Canton dApp</text>
  </g>
  <g transform="translate(1200, 40)">
    <rect width="144" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="16" cy="16" r="4" fill="#34d399"/>
    <text x="30" y="16" font-size="12" font-family="JetBrains Mono, monospace" fill="#f1f3f9" dominant-baseline="middle">0x742d…4B9e</text>
  </g>

  <!-- Back link -->
  <g transform="translate(96, 116)">
    <text font-size="13" font-weight="500" fill="#a1a6c4" dominant-baseline="middle">← Back to registration</text>
  </g>

  <!-- ═══ Centered card ═══ -->
  <g transform="translate(440, 220)">
    <rect width="560" height="480" rx="20" fill="url(#cardBg)" stroke="#252840"/>

    <!-- Mode tag -->
    <g transform="translate(32, 32)">
      <rect width="96" height="24" rx="12" fill="#8b7cff" fill-opacity="0.14" stroke="#8b7cff" stroke-opacity="0.3"/>
      <text x="48" y="12" font-size="10" font-weight="600" letter-spacing="1" fill="#8b7cff" text-anchor="middle" dominant-baseline="middle">CUSTODIAL</text>
    </g>

    <!-- Spinner icon -->
    <g transform="translate(248, 88)">
      <!-- Track -->
      <circle cx="32" cy="32" r="28" stroke="#252840" stroke-width="4" fill="none"/>
      <!-- Arc -->
      <path d="M60 32 A28 28 0 0 0 32 4" stroke="url(#ctaFill)" stroke-width="4" stroke-linecap="round" fill="none"/>
      <!-- Inner dot pulse -->
      <circle cx="32" cy="32" r="4" fill="#00d4a4"/>
    </g>

    <!-- Title -->
    <text x="280" y="208" font-size="24" font-weight="700" fill="#f1f3f9" text-anchor="middle">Confirm in MetaMask</text>

    <!-- Description -->
    <text x="280" y="244" font-size="14" fill="#a1a6c4" text-anchor="middle">Sign the registration message to prove you</text>
    <text x="280" y="264" font-size="14" fill="#a1a6c4" text-anchor="middle">own this wallet. The middleware will then</text>
    <text x="280" y="284" font-size="14" fill="#a1a6c4" text-anchor="middle">allocate a Canton party for you.</text>

    <!-- Message preview -->
    <g transform="translate(80, 320)">
      <text font-size="11" font-weight="600" letter-spacing="1" fill="#656a8a">MESSAGE YOU'LL SIGN (EIP-191)</text>
      <rect y="16" width="400" height="48" rx="8" fill="#0a0b14" stroke="#252840"/>
      <text x="20" y="42" font-size="13" font-family="JetBrains Mono, monospace" fill="#f1f3f9" dominant-baseline="middle">register:1713800000</text>
      <text x="380" y="42" font-size="10" fill="#656a8a" text-anchor="end" dominant-baseline="middle">UTC</text>
    </g>

    <!-- Cancel -->
    <text x="280" y="440" font-size="13" fill="#a1a6c4" text-anchor="middle">
      <tspan>Waiting for signature… </tspan>
      <tspan fill="#00d4a4" font-weight="600">Cancel</tspan>
    </text>
  </g>
</svg>
