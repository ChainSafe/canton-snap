<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="orbBrand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4a4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00d4a4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#12141f"/>
    </linearGradient>
    <linearGradient id="cardBgActive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2238"/>
      <stop offset="100%" stop-color="#141729"/>
    </linearGradient>
    <linearGradient id="ctaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0b8"/>
      <stop offset="100%" stop-color="#00d4a4"/>
    </linearGradient>

    <symbol id="checkDone" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="12" fill="#00d4a4" fill-opacity="0.15"/>
      <path d="M7 12 L10 15 L17 8" stroke="#00d4a4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
  </defs>

  <rect width="1440" height="900" fill="#0a0b14"/>
  <circle cx="720" cy="560" r="420" fill="url(#orbBrand)"/>

  <!-- ═══ Top bar ═══ -->
  <g transform="translate(96, 40)">
    <rect width="32" height="32" rx="8" fill="url(#ctaFill)"/>
    <path d="M10 16 L14 20 L22 12" stroke="#0a0b14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="48" y="16" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Canton dApp</text>
  </g>
  <!-- Network pill -->
  <g transform="translate(1056, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="14" cy="16" r="5" fill="#ffb84d"/>
    <text x="28" y="16" font-size="12" font-weight="500" fill="#f1f3f9" dominant-baseline="middle">Canton Devnet</text>
    <path d="M116 13 L120 17 L124 13" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wallet chip -->
  <g transform="translate(1204, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="14" cy="16" r="4" fill="#34d399"/>
    <text x="26" y="16" font-size="12" font-family="JetBrains Mono, monospace" fill="#f1f3f9" dominant-baseline="middle">0x742d…4B9e</text>
    <path d="M116 13 L120 17 L124 13" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ═══ Page header ═══ -->
  <g transform="translate(96, 116)">
    <text font-size="13" font-weight="500" fill="#a1a6c4" dominant-baseline="middle">← Back to registration</text>
  </g>

  <g transform="translate(0, 176)">
    <text x="720" y="0" font-size="32" font-weight="700" fill="#f1f3f9" text-anchor="middle" letter-spacing="-0.5">Register non-custodially</text>
    <text x="720" y="32" font-size="14" fill="#a1a6c4" text-anchor="middle">4 steps · each confirmed in MetaMask or the Canton snap.</text>

    <!-- Progress bar -->
    <g transform="translate(570, 56)">
      <rect width="300" height="4" rx="2" fill="#252840"/>
      <rect width="150" height="4" rx="2" fill="url(#ctaFill)"/>
      <text x="150" y="22" font-size="11" fill="#a1a6c4" text-anchor="middle">2 of 4 complete</text>
    </g>
  </g>

  <!-- ═══ Steps list ═══ -->
  <g transform="translate(360, 300)">

    <!-- Step 1 — done -->
    <g>
      <rect width="720" height="72" rx="12" fill="url(#cardBg)" stroke="#252840"/>
      <use href="#checkDone" x="24" y="24" width="24" height="24"/>
      <text x="68" y="32" font-size="15" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Export Canton public key</text>
      <text x="68" y="52" font-size="12" fill="#656a8a" dominant-baseline="middle">Snap returned your secp256k1 public key and fingerprint.</text>
      <text x="696" y="36" font-size="11" font-weight="600" letter-spacing="0.5" fill="#00d4a4" text-anchor="end" dominant-baseline="middle">DONE</text>
    </g>

    <!-- Step 2 — done -->
    <g transform="translate(0, 88)">
      <rect width="720" height="72" rx="12" fill="url(#cardBg)" stroke="#252840"/>
      <use href="#checkDone" x="24" y="24" width="24" height="24"/>
      <text x="68" y="32" font-size="15" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Prove wallet ownership</text>
      <text x="68" y="52" font-size="12" fill="#656a8a" dominant-baseline="middle">Signed register:1713800000 with MetaMask (EIP-191).</text>
      <text x="696" y="36" font-size="11" font-weight="600" letter-spacing="0.5" fill="#00d4a4" text-anchor="end" dominant-baseline="middle">DONE</text>
    </g>

    <!-- Step 3 — active -->
    <g transform="translate(0, 176)">
      <rect width="720" height="112" rx="12" fill="url(#cardBgActive)" stroke="#00d4a4" stroke-opacity="0.45"/>

      <!-- Active step indicator (spinner) -->
      <g transform="translate(24, 24)">
        <circle cx="12" cy="12" r="11" stroke="#252840" stroke-width="2.4" fill="none"/>
        <path d="M23 12 A11 11 0 0 0 12 1" stroke="#00d4a4" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      </g>

      <text x="68" y="32" font-size="15" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">Sign topology hash</text>
      <text x="68" y="52" font-size="12" fill="#a1a6c4" dominant-baseline="middle">Canton snap will show the multihash. Review and approve the signature.</text>

      <!-- Action -->
      <g transform="translate(68, 68)">
        <rect width="170" height="32" rx="8" fill="url(#ctaFill)"/>
        <text x="85" y="16" font-size="12" font-weight="700" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">Open snap dialog</text>
      </g>

      <text x="696" y="36" font-size="11" font-weight="600" letter-spacing="0.5" fill="#00d4a4" text-anchor="end" dominant-baseline="middle">IN PROGRESS</text>
    </g>

    <!-- Step 4 — locked -->
    <g transform="translate(0, 304)" opacity="0.5">
      <rect width="720" height="72" rx="12" fill="url(#cardBg)" stroke="#252840"/>
      <g transform="translate(24, 24)">
        <circle cx="12" cy="12" r="12" fill="#232640"/>
        <text x="12" y="12" font-size="11" font-weight="700" fill="#656a8a" text-anchor="middle" dominant-baseline="middle">4</text>
      </g>
      <text x="68" y="32" font-size="15" font-weight="600" fill="#a1a6c4" dominant-baseline="middle">Submit registration</text>
      <text x="68" y="52" font-size="12" fill="#656a8a" dominant-baseline="middle">POST to middleware with all collected signatures.</text>
      <text x="696" y="36" font-size="11" font-weight="600" letter-spacing="0.5" fill="#656a8a" text-anchor="end" dominant-baseline="middle">LOCKED</text>
    </g>
  </g>

  <!-- Helper -->
  <text x="720" y="752" font-size="12" fill="#656a8a" text-anchor="middle">Each step requires a confirmation. You can cancel at any time without registering.</text>
</svg>
