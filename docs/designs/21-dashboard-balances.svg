<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="orbBrand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4a4" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00d4a4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#12141f"/>
    </linearGradient>
    <linearGradient id="ctaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0b8"/>
      <stop offset="100%" stop-color="#00d4a4"/>
    </linearGradient>

    <symbol id="icoProfile" viewBox="0 0 20 20">
      <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <path d="M3 17 C3 13 6 11 10 11 C14 11 17 13 17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    </symbol>
    <symbol id="icoBalances" viewBox="0 0 20 20">
      <rect x="2" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <path d="M2 9 H18" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="14" cy="13" r="1.5" fill="currentColor"/>
    </symbol>
    <symbol id="icoTransfer" viewBox="0 0 20 20">
      <path d="M4 10 H15 M10 5 L15 10 L10 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icoBridge" viewBox="0 0 20 20">
      <path d="M3 8 H15 M12 5 L15 8 L12 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M17 12 H5 M8 15 L5 12 L8 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icoActivity" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <path d="M10 6 V10 L13 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    </symbol>
  </defs>

  <rect width="1440" height="900" fill="#0a0b14"/>
  <circle cx="960" cy="300" r="440" fill="url(#orbBrand)"/>

  <!-- ═══ SIDEBAR ═══ -->
  <g>
    <rect width="240" height="900" fill="#0d0f19"/>
    <line x1="240" y1="0" x2="240" y2="900" stroke="#252840"/>

    <g transform="translate(24, 28)">
      <rect width="32" height="32" rx="8" fill="url(#ctaFill)"/>
      <path d="M10 16 L14 20 L22 12" stroke="#0a0b14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="48" y="16" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Canton dApp</text>
    </g>

    <line x1="24" y1="80" x2="216" y2="80" stroke="#252840"/>

    <g font-size="13" font-weight="500" transform="translate(0, 104)">
      <g transform="translate(16, 0)">
        <g transform="translate(16, 10)" color="#a1a6c4"><use href="#icoProfile" width="20" height="20"/></g>
        <text x="48" y="20" fill="#a1a6c4" dominant-baseline="middle">Profile</text>
      </g>

      <!-- Balances (active) -->
      <g transform="translate(16, 48)">
        <rect width="208" height="40" rx="10" fill="#00d4a4" fill-opacity="0.1"/>
        <rect width="3" height="22" y="9" rx="1.5" fill="#00d4a4"/>
        <g transform="translate(16, 10)" color="#00d4a4"><use href="#icoBalances" width="20" height="20"/></g>
        <text x="48" y="20" fill="#00d4a4" font-weight="600" dominant-baseline="middle">Balances</text>
      </g>

      <g transform="translate(16, 96)">
        <g transform="translate(16, 10)" color="#a1a6c4"><use href="#icoTransfer" width="20" height="20"/></g>
        <text x="48" y="20" fill="#a1a6c4" dominant-baseline="middle">Transfer</text>
      </g>

      <g transform="translate(16, 144)">
        <g transform="translate(16, 10)" color="#a1a6c4"><use href="#icoBridge" width="20" height="20"/></g>
        <text x="48" y="20" fill="#a1a6c4" dominant-baseline="middle">Bridge</text>
      </g>

      <g transform="translate(16, 192)">
        <g transform="translate(16, 10)" color="#a1a6c4"><use href="#icoActivity" width="20" height="20"/></g>
        <text x="48" y="20" fill="#a1a6c4" dominant-baseline="middle">Activity</text>
      </g>
    </g>

  </g>

  <!-- Top bar -->
  <g transform="translate(1056, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="14" cy="16" r="5" fill="#ffb84d"/>
    <text x="28" y="16" font-size="12" font-weight="500" fill="#f1f3f9" dominant-baseline="middle">Canton Devnet</text>
    <path d="M116 13 L120 17 L124 13" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <g transform="translate(1204, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="14" cy="16" r="4" fill="#34d399"/>
    <text x="26" y="16" font-size="12" font-family="JetBrains Mono, monospace" fill="#f1f3f9" dominant-baseline="middle">0x742d…4B9e</text>
    <path d="M116 13 L120 17 L124 13" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ═══ MAIN CONTENT ═══ -->
  <g transform="translate(280, 104)">
    <text font-size="28" font-weight="700" fill="#f1f3f9" letter-spacing="-0.4">Balances</text>
    <text y="28" font-size="13" fill="#a1a6c4">Canton Network tokens held by this party.</text>

    <!-- Quick action pinned top-right -->
    <g transform="translate(960, 0)">
      <rect width="160" height="44" rx="10" fill="url(#ctaFill)"/>
      <g transform="translate(24, 13)" stroke="#0a0b14" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 9 L16 9 M10 3 L16 9 L10 15"/>
      </g>
      <text x="96" y="22" font-size="13" font-weight="700" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">Send tokens</text>
    </g>

    <!-- Token list -->
    <g transform="translate(0, 88)">
      <!-- Column headers -->
      <g font-size="11" font-weight="600" letter-spacing="1" fill="#656a8a">
        <text x="16" y="0">ASSET</text>
        <text x="900" y="0" text-anchor="end">BALANCE</text>
        <text x="1104" y="0" text-anchor="end">ACTIONS</text>
      </g>

      <!-- Rows container -->
      <g transform="translate(0, 16)">
        <rect width="1120" height="352" rx="16" fill="url(#cardBg)" stroke="#252840"/>

        <!-- USDCx -->
        <g transform="translate(0, 0)">
          <g transform="translate(24, 24)">
            <circle cx="22" cy="22" r="22" fill="#2775ca"/>
            <text x="22" y="22" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">$</text>
          </g>
          <text x="80" y="40" font-size="15" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">USDCx</text>
          <text x="80" y="58" font-size="12" fill="#656a8a" dominant-baseline="middle">USD Coin (Canton)</text>

          <text x="900" y="40" font-size="18" font-weight="700" font-family="JetBrains Mono, monospace" fill="#f1f3f9" text-anchor="end" dominant-baseline="middle">1,250.00</text>
          <text x="900" y="60" font-size="11" fill="#656a8a" text-anchor="end" dominant-baseline="middle">USDCx</text>

          <text x="1104" y="48" font-size="12" font-weight="600" fill="#00d4a4" text-anchor="end" dominant-baseline="middle">Send →</text>

          <line x1="24" y1="96" x2="1096" y2="96" stroke="#252840"/>
        </g>

        <!-- DEMO -->
        <g transform="translate(0, 96)">
          <g transform="translate(24, 24)">
            <circle cx="22" cy="22" r="22" fill="#00d4a4"/>
            <text x="22" y="22" font-size="12" font-weight="700" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">D</text>
          </g>
          <text x="80" y="40" font-size="15" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">DEMO</text>
          <text x="80" y="58" font-size="12" fill="#656a8a" dominant-baseline="middle">Demo Token</text>

          <text x="900" y="40" font-size="18" font-weight="700" font-family="JetBrains Mono, monospace" fill="#f1f3f9" text-anchor="end" dominant-baseline="middle">4,500.25</text>
          <text x="900" y="60" font-size="11" fill="#656a8a" text-anchor="end" dominant-baseline="middle">DEMO</text>

          <text x="1104" y="48" font-size="12" font-weight="600" fill="#00d4a4" text-anchor="end" dominant-baseline="middle">Send →</text>

          <line x1="24" y1="96" x2="1096" y2="96" stroke="#252840"/>
        </g>

        <!-- PROMPT -->
        <g transform="translate(0, 192)">
          <g transform="translate(24, 24)">
            <circle cx="22" cy="22" r="22" fill="#8b7cff"/>
            <text x="22" y="22" font-size="12" font-weight="700" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">P</text>
          </g>
          <text x="80" y="40" font-size="15" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">PROMPT</text>
          <text x="80" y="58" font-size="12" fill="#656a8a" dominant-baseline="middle">Prompt Token</text>

          <text x="900" y="40" font-size="18" font-weight="700" font-family="JetBrains Mono, monospace" fill="#f1f3f9" text-anchor="end" dominant-baseline="middle">78</text>
          <text x="900" y="60" font-size="11" fill="#656a8a" text-anchor="end" dominant-baseline="middle">PROMPT</text>

          <text x="1104" y="48" font-size="12" font-weight="600" fill="#00d4a4" text-anchor="end" dominant-baseline="middle">Send →</text>

          <line x1="24" y1="96" x2="1096" y2="96" stroke="#252840"/>
        </g>

        <!-- Empty hint row -->
        <g transform="translate(0, 288)">
          <text x="560" y="32" font-size="12" fill="#656a8a" text-anchor="middle">More tokens supported by the middleware will appear here as they're added.</text>
        </g>
      </g>
    </g>
  </g>
</svg>
