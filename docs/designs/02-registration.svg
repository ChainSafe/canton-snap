<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <!-- ═══ Defs ═══ -->
  <defs>
    <radialGradient id="orbBrand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4a4" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00d4a4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b7cff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8b7cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#12141f"/>
    </linearGradient>
    <linearGradient id="cardBgHot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2238"/>
      <stop offset="100%" stop-color="#141729"/>
    </linearGradient>
    <linearGradient id="ctaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0b8"/>
      <stop offset="100%" stop-color="#00d4a4"/>
    </linearGradient>
    <linearGradient id="heroText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b6bcd9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- Checkmark template -->
    <symbol id="check" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="8" fill="#00d4a4" fill-opacity="0.15"/>
      <path d="M4 8 L7 11 L12 5.5" stroke="#00d4a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>

    <!-- Info dot template -->
    <symbol id="info" viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="8" fill="#656a8a" fill-opacity="0.18"/>
      <path d="M4 8 L7 11 L12 5.5" stroke="#a1a6c4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
  </defs>

  <!-- Page background -->
  <rect width="1440" height="900" fill="#0a0b14"/>

  <!-- Ambient orbs -->
  <circle cx="300" cy="440" r="320" fill="url(#orbViolet)"/>
  <circle cx="1140" cy="440" r="320" fill="url(#orbBrand)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#ffffff" stroke-width="1">
    <path d="M0 200 H1440 M0 400 H1440 M0 600 H1440 M0 800 H1440"/>
    <path d="M240 0 V900 M480 0 V900 M720 0 V900 M960 0 V900 M1200 0 V900"/>
  </g>

  <!-- ═══ Navigation bar ═══ -->
  <g>
    <rect width="1440" height="72" fill="#0a0b14" fill-opacity="0.8"/>
    <line y1="72" x2="1440" y2="72" stroke="#252840"/>

    <!-- Logo -->
    <g transform="translate(96, 24)">
      <rect width="32" height="32" rx="8" fill="url(#ctaFill)"/>
      <path d="M10 16 L14 20 L22 12" stroke="#0a0b14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="48" y="15" font-size="15" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">Canton Snap</text>
      <text x="48" y="28" font-size="11" fill="#656a8a" dominant-baseline="middle">Registration</text>
    </g>

    <!-- Connected wallet chip -->
    <g transform="translate(1200, 20)">
      <rect width="148" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
      <circle cx="16" cy="16" r="5" fill="#34d399"/>
      <circle cx="16" cy="16" r="5" fill="#34d399" fill-opacity="0.3" stroke="#34d399" stroke-opacity="0.4" stroke-width="1" transform="scale(1.6)" transform-origin="16 16"/>
      <text x="30" y="16" font-size="12" font-family="JetBrains Mono, monospace" fill="#f1f3f9" dominant-baseline="middle">0x742d…4B9e</text>
      <text x="120" y="16" font-size="11" fill="#a1a6c4" dominant-baseline="middle">▾</text>
    </g>
  </g>

  <!-- ═══ Page header ═══ -->
  <g transform="translate(96, 116)">
    <!-- Back button -->
    <g>
      <text x="0" y="0" font-size="13" font-weight="500" fill="#a1a6c4" dominant-baseline="middle">← Back</text>
    </g>

    <!-- Step indicator -->
    <g transform="translate(0, 28)">
      <rect width="8" height="8" rx="4" fill="#00d4a4"/>
      <rect x="16" width="40" height="8" rx="4" fill="#00d4a4"/>
      <rect x="64" width="40" height="8" rx="4" fill="#252840"/>
      <rect x="112" width="40" height="8" rx="4" fill="#252840"/>
      <text x="170" y="4" font-size="11" font-weight="600" fill="#a1a6c4" dominant-baseline="middle">Step 2 of 4 · Choose registration mode</text>
    </g>

    <!-- Page title -->
    <text x="0" y="100" font-size="44" font-weight="800" fill="url(#heroText)" letter-spacing="-1.2">How do you want to manage your keys?</text>
    <text x="0" y="140" font-size="16" fill="#a1a6c4" letter-spacing="-0.1">Both options register a Canton party for your wallet. The difference is who controls the private signing key.</text>
  </g>

  <!-- ═══ Custodial card ═══ -->
  <g transform="translate(96, 292)">
    <!-- Shadow + card -->
    <rect x="3" y="6" width="612" height="520" rx="20" fill="#000" fill-opacity="0.3"/>
    <rect width="612" height="520" rx="20" fill="url(#cardBg)" stroke="#252840" stroke-width="1"/>

    <!-- Header row -->
    <g transform="translate(36, 36)">
      <!-- Icon -->
      <rect width="56" height="56" rx="14" fill="#8b7cff" fill-opacity="0.12"/>
      <g transform="translate(14, 14)" stroke="#8b7cff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 10 V8 C8 5 11 2 14 2 C17 2 20 5 20 8 V10"/>
        <rect x="5" y="10" width="18" height="15" rx="3" fill="#8b7cff" fill-opacity="0.1"/>
        <circle cx="14" cy="17" r="2" fill="#8b7cff" stroke="none"/>
      </g>

      <!-- Title & subtitle -->
      <text x="76" y="18" font-size="22" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">Custodial</text>
      <text x="76" y="42" font-size="13" fill="#a1a6c4" dominant-baseline="middle">Middleware manages your Canton key</text>

      <!-- Tag -->
      <g transform="translate(464, 6)">
        <rect width="108" height="26" rx="13" fill="#8b7cff" fill-opacity="0.12" stroke="#8b7cff" stroke-opacity="0.3"/>
        <text x="54" y="13" font-size="11" font-weight="600" letter-spacing="0.4" fill="#8b7cff" text-anchor="middle" dominant-baseline="middle">EASIEST</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="36" y1="120" x2="576" y2="120" stroke="#252840"/>

    <!-- Description -->
    <g transform="translate(36, 148)">
      <text font-size="14" fill="#a1a6c4" letter-spacing="-0.1">One click to register. The Canton middleware generates and</text>
      <text y="22" font-size="14" fill="#a1a6c4" letter-spacing="-0.1">stores the signing key on your behalf — you only sign a</text>
      <text y="44" font-size="14" fill="#a1a6c4" letter-spacing="-0.1">single EIP-191 message with MetaMask to prove wallet</text>
      <text y="66" font-size="14" fill="#a1a6c4" letter-spacing="-0.1">ownership, then you're done.</text>
    </g>

    <!-- Feature list -->
    <g transform="translate(36, 252)">
      <!-- Pros -->
      <g>
        <use href="#check" x="0" y="0" width="16" height="16"/>
        <text x="26" y="8" font-size="13" fill="#f1f3f9" dominant-baseline="middle">One-click registration &amp; signing</text>
      </g>
      <g transform="translate(0, 28)">
        <use href="#check" x="0" y="0" width="16" height="16"/>
        <text x="26" y="8" font-size="13" fill="#f1f3f9" dominant-baseline="middle">No MetaMask Flask required</text>
      </g>
      <g transform="translate(0, 56)">
        <use href="#check" x="0" y="0" width="16" height="16"/>
        <text x="26" y="8" font-size="13" fill="#f1f3f9" dominant-baseline="middle">Great for testing and onboarding</text>
      </g>
      <!-- Con -->
      <g transform="translate(0, 92)">
        <circle cx="8" cy="8" r="8" fill="#ffb84d" fill-opacity="0.15"/>
        <path d="M8 4 V10 M8 12 V13.5" stroke="#ffb84d" stroke-width="2" stroke-linecap="round"/>
        <text x="26" y="8" font-size="13" fill="#ffb84d" dominant-baseline="middle">Middleware holds the private key</text>
      </g>
    </g>

    <!-- CTA -->
    <g transform="translate(36, 430)">
      <rect width="540" height="52" rx="26" fill="#232640" stroke="#353a5a"/>
      <text x="270" y="26" font-size="14" font-weight="600" fill="#f1f3f9" text-anchor="middle" dominant-baseline="middle">Continue with Custodial</text>
      <text x="438" y="26" font-size="14" fill="#a1a6c4" dominant-baseline="middle">→</text>
    </g>
  </g>

  <!-- ═══ Non-custodial card (recommended, subtle highlight) ═══ -->
  <g transform="translate(732, 282)">
    <!-- Outer glow for recommended -->
    <rect x="-4" y="6" width="620" height="540" rx="22" fill="#00d4a4" fill-opacity="0.08" filter="url(#glow)"/>
    <!-- Shadow + card -->
    <rect x="3" y="6" width="612" height="530" rx="20" fill="#000" fill-opacity="0.3"/>
    <rect width="612" height="530" rx="20" fill="url(#cardBgHot)" stroke="#00d4a4" stroke-opacity="0.4" stroke-width="1.5"/>

    <!-- Recommended ribbon -->
    <g transform="translate(420, -14)">
      <rect width="180" height="28" rx="14" fill="url(#ctaFill)"/>
      <path d="M10 14 L14 18 L22 10" stroke="#0a0b14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="96" y="14" font-size="11" font-weight="700" letter-spacing="0.6" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">RECOMMENDED</text>
    </g>

    <!-- Header row -->
    <g transform="translate(36, 36)">
      <rect width="56" height="56" rx="14" fill="#00d4a4" fill-opacity="0.15"/>
      <g transform="translate(14, 14)" stroke="#00d4a4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2 L5 7 V15 C5 22 9 26 14 28 C19 26 23 22 23 15 V7 Z"/>
        <path d="M10 15 L13 18 L19 11"/>
      </g>

      <text x="76" y="18" font-size="22" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">Non-Custodial</text>
      <text x="76" y="42" font-size="13" fill="#a1a6c4" dominant-baseline="middle">MetaMask Snap holds your Canton key</text>

      <!-- Tag -->
      <g transform="translate(444, 6)">
        <rect width="128" height="26" rx="13" fill="#00d4a4" fill-opacity="0.15" stroke="#00d4a4" stroke-opacity="0.35"/>
        <text x="64" y="13" font-size="11" font-weight="600" letter-spacing="0.4" fill="#00d4a4" text-anchor="middle" dominant-baseline="middle">MOST SECURE</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="36" y1="120" x2="576" y2="120" stroke="#00d4a4" stroke-opacity="0.15"/>

    <!-- Description -->
    <g transform="translate(36, 148)">
      <text font-size="14" fill="#a1a6c4" letter-spacing="-0.1">The private signing key is derived inside MetaMask Flask</text>
      <text y="22" font-size="14" fill="#a1a6c4" letter-spacing="-0.1">from your seed phrase and never leaves the snap. Every</text>
      <text y="44" font-size="14" fill="#a1a6c4" letter-spacing="-0.1">signature requires an explicit confirmation dialog — you</text>
      <text y="66" font-size="14" fill="#a1a6c4" letter-spacing="-0.1">see the hash and the transaction before approving.</text>
    </g>

    <!-- 4-step mini indicator -->
    <g transform="translate(36, 252)">
      <text font-size="11" font-weight="600" letter-spacing="1" fill="#656a8a">REGISTRATION STEPS</text>
      <g transform="translate(0, 20)">
        <!-- Step dots -->
        <g>
          <circle cx="10" cy="10" r="10" fill="#00d4a4" fill-opacity="0.15" stroke="#00d4a4"/>
          <text x="10" y="10" font-size="10" font-weight="700" fill="#00d4a4" text-anchor="middle" dominant-baseline="middle">1</text>
          <text x="30" y="10" font-size="12" fill="#f1f3f9" dominant-baseline="middle">Export public key from snap</text>
        </g>
        <line x1="10" y1="24" x2="10" y2="34" stroke="#00d4a4" stroke-opacity="0.3"/>
        <g transform="translate(0, 34)">
          <circle cx="10" cy="10" r="10" fill="#00d4a4" fill-opacity="0.15" stroke="#00d4a4"/>
          <text x="10" y="10" font-size="10" font-weight="700" fill="#00d4a4" text-anchor="middle" dominant-baseline="middle">2</text>
          <text x="30" y="10" font-size="12" fill="#f1f3f9" dominant-baseline="middle">Prove wallet ownership (EIP-191)</text>
        </g>
        <line x1="10" y1="58" x2="10" y2="68" stroke="#00d4a4" stroke-opacity="0.3"/>
        <g transform="translate(0, 68)">
          <circle cx="10" cy="10" r="10" fill="#00d4a4" fill-opacity="0.15" stroke="#00d4a4"/>
          <text x="10" y="10" font-size="10" font-weight="700" fill="#00d4a4" text-anchor="middle" dominant-baseline="middle">3</text>
          <text x="30" y="10" font-size="12" fill="#f1f3f9" dominant-baseline="middle">Sign Canton topology hash</text>
        </g>
        <line x1="10" y1="92" x2="10" y2="102" stroke="#00d4a4" stroke-opacity="0.3"/>
        <g transform="translate(0, 102)">
          <circle cx="10" cy="10" r="10" fill="#00d4a4" fill-opacity="0.15" stroke="#00d4a4"/>
          <text x="10" y="10" font-size="10" font-weight="700" fill="#00d4a4" text-anchor="middle" dominant-baseline="middle">4</text>
          <text x="30" y="10" font-size="12" fill="#f1f3f9" dominant-baseline="middle">Submit registration to middleware</text>
        </g>
      </g>
    </g>

    <!-- CTA -->
    <g transform="translate(36, 448)">
      <rect width="540" height="52" rx="26" fill="url(#ctaFill)"/>
      <g transform="translate(18, 14)" stroke="#0a0b14" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 4 V20 M4 12 H20"/>
      </g>
      <text x="270" y="26" font-size="14" font-weight="700" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">Continue with Non-Custodial</text>
      <text x="504" y="26" font-size="14" font-weight="700" fill="#0a0b14" dominant-baseline="middle">→</text>
    </g>
  </g>

  <!-- ═══ Footer help banner ═══ -->
  <g transform="translate(96, 832)">
    <rect width="1248" height="52" rx="12" fill="#12141f" stroke="#252840"/>
    <g transform="translate(18, 18)">
      <use href="#info" x="0" y="0" width="16" height="16"/>
    </g>
    <text x="46" y="28" font-size="13" fill="#a1a6c4" dominant-baseline="middle">Not sure which to pick? You can switch later by registering a new address. Both modes interact with Canton the same way once registered.</text>
    <text x="1092" y="28" font-size="13" font-weight="600" fill="#00d4a4" dominant-baseline="middle">Compare in detail →</text>
  </g>
</svg>
