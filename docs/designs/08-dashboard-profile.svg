<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="orbBrand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4a4" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00d4a4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#12141f"/>
    </linearGradient>
    <linearGradient id="ctaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0b8"/>
      <stop offset="100%" stop-color="#00d4a4"/>
    </linearGradient>

    <symbol id="icoProfile" viewBox="0 0 20 20">
      <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <path d="M3 17 C3 13 6 11 10 11 C14 11 17 13 17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    </symbol>
    <symbol id="icoBalances" viewBox="0 0 20 20">
      <rect x="2" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <path d="M2 9 H18" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="14" cy="13" r="1.5" fill="currentColor"/>
    </symbol>
    <symbol id="icoTransfer" viewBox="0 0 20 20">
      <path d="M4 10 H15 M10 5 L15 10 L10 15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icoBridge" viewBox="0 0 20 20">
      <path d="M3 8 H15 M12 5 L15 8 L12 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M17 12 H5 M8 15 L5 12 L8 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </symbol>
    <symbol id="icoActivity" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <path d="M10 6 V10 L13 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
    </symbol>
  </defs>

  <rect width="1440" height="900" fill="#0a0b14"/>
  <circle cx="960" cy="300" r="440" fill="url(#orbBrand)"/>

  <!-- ═══ SIDEBAR ═══ -->
  <g>
    <rect width="240" height="900" fill="#0d0f19"/>
    <line x1="240" y1="0" x2="240" y2="900" stroke="#252840"/>

    <g transform="translate(24, 28)">
      <rect width="32" height="32" rx="8" fill="url(#ctaFill)"/>
      <path d="M10 16 L14 20 L22 12" stroke="#0a0b14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="48" y="16" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Canton dApp</text>
    </g>

    <line x1="24" y1="80" x2="216" y2="80" stroke="#252840"/>

    <g font-size="13" font-weight="500" transform="translate(0, 104)">
      <!-- Profile (active) -->
      <g transform="translate(16, 0)">
        <rect width="208" height="40" rx="10" fill="#00d4a4" fill-opacity="0.1"/>
        <rect width="3" height="22" y="9" rx="1.5" fill="#00d4a4"/>
        <g transform="translate(16, 10)" color="#00d4a4"><use href="#icoProfile" width="20" height="20"/></g>
        <text x="48" y="20" fill="#00d4a4" font-weight="600" dominant-baseline="middle">Profile</text>
      </g>

      <g transform="translate(16, 48)">
        <g transform="translate(16, 10)" color="#a1a6c4"><use href="#icoBalances" width="20" height="20"/></g>
        <text x="48" y="20" fill="#a1a6c4" dominant-baseline="middle">Balances</text>
      </g>

      <g transform="translate(16, 96)">
        <g transform="translate(16, 10)" color="#a1a6c4"><use href="#icoTransfer" width="20" height="20"/></g>
        <text x="48" y="20" fill="#a1a6c4" dominant-baseline="middle">Transfer</text>
      </g>

      <g transform="translate(16, 144)">
        <g transform="translate(16, 10)" color="#a1a6c4"><use href="#icoBridge" width="20" height="20"/></g>
        <text x="48" y="20" fill="#a1a6c4" dominant-baseline="middle">Bridge</text>
      </g>

      <g transform="translate(16, 192)">
        <g transform="translate(16, 10)" color="#a1a6c4"><use href="#icoActivity" width="20" height="20"/></g>
        <text x="48" y="20" fill="#a1a6c4" dominant-baseline="middle">Activity</text>
      </g>
    </g>

    <!-- Sidebar footer -->
    <g transform="translate(16, 820)">
      <rect width="208" height="56" rx="10" fill="#12141f" stroke="#252840"/>
      <circle cx="18" cy="28" r="4" fill="#34d399"/>
      <text x="32" y="22" font-size="11" fill="#a1a6c4" dominant-baseline="middle">Canton Snap</text>
      <text x="32" y="38" font-size="11" font-family="JetBrains Mono, monospace" fill="#f1f3f9" dominant-baseline="middle">v0.2.0 · healthy</text>
    </g>
  </g>

  <!-- ═══ TOP BAR (main area) ═══ -->
  <g transform="translate(1056, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="14" cy="16" r="5" fill="#ffb84d"/>
    <text x="28" y="16" font-size="12" font-weight="500" fill="#f1f3f9" dominant-baseline="middle">Canton Devnet</text>
    <path d="M116 13 L120 17 L124 13" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <g transform="translate(1204, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="14" cy="16" r="4" fill="#34d399"/>
    <text x="26" y="16" font-size="12" font-family="JetBrains Mono, monospace" fill="#f1f3f9" dominant-baseline="middle">0x742d…4B9e</text>
    <path d="M116 13 L120 17 L124 13" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ═══ MAIN CONTENT ═══ -->
  <g transform="translate(280, 104)">
    <text font-size="28" font-weight="700" fill="#f1f3f9" letter-spacing="-0.4">Profile</text>
    <text y="28" font-size="13" fill="#a1a6c4">Your Canton identity and quick actions.</text>

    <!-- Identity card -->
    <g transform="translate(0, 64)">
      <rect width="1120" height="220" rx="16" fill="url(#cardBg)" stroke="#252840"/>

      <g transform="translate(32, 32)">
        <text font-size="11" font-weight="600" letter-spacing="1.2" fill="#656a8a">CANTON PARTY</text>
        <g transform="translate(0, 20)">
          <text font-size="20" font-weight="700" font-family="JetBrains Mono, monospace" fill="#f1f3f9">user_0x742d35Cc::12201a</text>
          <text y="22" font-size="13" font-family="JetBrains Mono, monospace" fill="#656a8a">…f2df59b0b36a3bb5d6836a5d03350fb4d</text>
          <g transform="translate(624, -4)" stroke="#a1a6c4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="0" width="14" height="16" rx="2"/>
            <path d="M0 14 V4 Q0 2 2 2 H12"/>
          </g>
        </g>

        <g transform="translate(0, 88)">
          <text font-size="11" font-weight="600" letter-spacing="1.2" fill="#656a8a">FINGERPRINT</text>
          <text y="18" font-size="12" font-family="JetBrains Mono, monospace" fill="#a1a6c4">1220a7f3c2b1…8e92f5d4</text>
          <g transform="translate(260, 2)">
            <rect width="108" height="22" rx="11" fill="#00d4a4" fill-opacity="0.12" stroke="#00d4a4" stroke-opacity="0.3"/>
            <text x="54" y="11" font-size="10" font-weight="600" letter-spacing="0.6" fill="#00d4a4" text-anchor="middle" dominant-baseline="middle">NON-CUSTODIAL</text>
          </g>
        </g>
      </g>

      <!-- Right: Send + Bridge buttons — clicking navigates to Transfer / Bridge tabs -->
      <g transform="translate(788, 40)">
        <text font-size="11" font-weight="600" letter-spacing="1.2" fill="#656a8a">QUICK ACTIONS</text>

        <g transform="translate(0, 20)">
          <rect width="300" height="56" rx="12" fill="url(#ctaFill)"/>
          <g transform="translate(24, 18)" stroke="#0a0b14" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 10 L18 10 M12 4 L18 10 L12 16"/>
          </g>
          <text x="60" y="22" font-size="14" font-weight="700" fill="#0a0b14" dominant-baseline="middle">Send tokens</text>
          <text x="60" y="40" font-size="11" fill="#0a0b14" opacity="0.7" dominant-baseline="middle">Transfer on Canton Network</text>
        </g>

        <g transform="translate(0, 88)">
          <rect width="300" height="56" rx="12" fill="#232640" stroke="#353a5a"/>
          <g transform="translate(24, 18)" stroke="#a1a6c4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 7 L14 7 M11 4 L14 7 L11 10 M18 13 L6 13 M9 10 L6 13 L9 16"/>
          </g>
          <text x="60" y="22" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Bridge assets</text>
          <text x="60" y="40" font-size="11" fill="#a1a6c4" dominant-baseline="middle">Move between networks</text>
        </g>
      </g>
    </g>

    <!-- Connection status card -->
    <g transform="translate(0, 308)">
      <rect width="1120" height="152" rx="16" fill="url(#cardBg)" stroke="#252840"/>

      <text x="32" y="32" font-size="14" font-weight="700" fill="#f1f3f9">Connection</text>

      <g transform="translate(32, 60)">
        <g>
          <text font-size="11" font-weight="600" letter-spacing="1" fill="#656a8a">METAMASK</text>
          <g transform="translate(0, 20)">
            <circle cx="6" cy="6" r="6" fill="#34d399"/>
            <text x="20" y="6" font-size="13" font-weight="500" fill="#f1f3f9" dominant-baseline="middle">Connected</text>
          </g>
          <text y="58" font-size="11" font-family="JetBrains Mono, monospace" fill="#656a8a">0x742d…4B9e</text>
        </g>

        <g transform="translate(352, 0)">
          <text font-size="11" font-weight="600" letter-spacing="1" fill="#656a8a">CANTON SNAP</text>
          <g transform="translate(0, 20)">
            <circle cx="6" cy="6" r="6" fill="#34d399"/>
            <text x="20" y="6" font-size="13" font-weight="500" fill="#f1f3f9" dominant-baseline="middle">Installed · v0.2.0</text>
          </g>
          <text y="58" font-size="11" fill="#00d4a4" font-weight="600">Manage snap →</text>
        </g>

        <g transform="translate(704, 0)">
          <text font-size="11" font-weight="600" letter-spacing="1" fill="#656a8a">MIDDLEWARE</text>
          <g transform="translate(0, 20)">
            <circle cx="6" cy="6" r="6" fill="#ffb84d"/>
            <text x="20" y="6" font-size="13" font-weight="500" fill="#f1f3f9" dominant-baseline="middle">Canton Devnet</text>
          </g>
          <text y="58" font-size="11" font-family="JetBrains Mono, monospace" fill="#656a8a">devnet.canton.network</text>
        </g>
      </g>
    </g>
  </g>
</svg>
