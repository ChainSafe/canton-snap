<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="orbBrand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4a4" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00d4a4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#12141f"/>
    </linearGradient>
    <linearGradient id="ctaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0b8"/>
      <stop offset="100%" stop-color="#00d4a4"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="1080" fill="#0a0b14"/>
  <circle cx="720" cy="300" r="440" fill="url(#orbBrand)"/>

  <!-- ═══ Top bar ═══ -->
  <g transform="translate(96, 40)">
    <rect width="32" height="32" rx="8" fill="url(#ctaFill)"/>
    <path d="M10 16 L14 20 L22 12" stroke="#0a0b14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="48" y="16" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Canton dApp</text>
  </g>

  <!-- Network pill -->
  <g transform="translate(1056, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="14" cy="16" r="5" fill="#ffb84d"/>
    <text x="28" y="16" font-size="12" font-weight="500" fill="#f1f3f9" dominant-baseline="middle">Canton Devnet</text>
    <path d="M116 13 L120 17 L124 13" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wallet chip -->
  <g transform="translate(1204, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="14" cy="16" r="4" fill="#34d399"/>
    <text x="26" y="16" font-size="12" font-family="JetBrains Mono, monospace" fill="#f1f3f9" dominant-baseline="middle">0x742d…4B9e</text>
    <path d="M116 13 L120 17 L124 13" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <line x1="0" y1="96" x2="1440" y2="96" stroke="#252840"/>

  <!-- ═══ Top section: identity + quick actions ═══ -->
  <g transform="translate(96, 136)">
    <rect width="1248" height="152" rx="16" fill="url(#cardBg)" stroke="#252840"/>

    <!-- Left — identity -->
    <g transform="translate(32, 28)">
      <text font-size="11" font-weight="600" letter-spacing="1.2" fill="#656a8a">CANTON PARTY</text>
      <g transform="translate(0, 22)">
        <text font-size="20" font-weight="700" font-family="JetBrains Mono, monospace" fill="#f1f3f9">user_0x742d35Cc::12201a</text>
        <text y="22" font-size="13" font-family="JetBrains Mono, monospace" fill="#656a8a">…f2df59b0b36a3bb5d6836a5d03350fb4d</text>
        <!-- Copy -->
        <g transform="translate(624, -4)" stroke="#a1a6c4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="0" width="14" height="16" rx="2"/>
          <path d="M0 14 V4 Q0 2 2 2 H12"/>
        </g>
      </g>

      <!-- Secondary row: fingerprint + key mode -->
      <g transform="translate(0, 84)">
        <text font-size="11" font-weight="600" letter-spacing="1.2" fill="#656a8a">FINGERPRINT</text>
        <text y="18" font-size="12" font-family="JetBrains Mono, monospace" fill="#a1a6c4">1220a7f3c2b1…8e92f5d4</text>
        <!-- Mode tag -->
        <g transform="translate(300, 2)">
          <rect width="108" height="22" rx="11" fill="#00d4a4" fill-opacity="0.12" stroke="#00d4a4" stroke-opacity="0.3"/>
          <text x="54" y="11" font-size="10" font-weight="600" letter-spacing="0.6" fill="#00d4a4" text-anchor="middle" dominant-baseline="middle">NON-CUSTODIAL</text>
        </g>
      </g>
    </g>

    <!-- Right — quick actions -->
    <g transform="translate(900, 36)">
      <!-- Send (primary) -->
      <g>
        <rect width="150" height="44" rx="10" fill="url(#ctaFill)"/>
        <g transform="translate(24, 13)" stroke="#0a0b14" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 9 L16 9 M10 3 L16 9 L10 15"/>
        </g>
        <text x="96" y="22" font-size="14" font-weight="700" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">Send</text>
      </g>
      <!-- Bridge -->
      <g transform="translate(166, 0)">
        <rect width="150" height="44" rx="10" fill="#232640" stroke="#353a5a"/>
        <g transform="translate(22, 13)" stroke="#a1a6c4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 7 L8 3 M2 11 L8 15 M14 7 L8 11 M14 11 L8 7"/>
        </g>
        <text x="96" y="22" font-size="14" font-weight="600" fill="#f1f3f9" text-anchor="middle" dominant-baseline="middle">Bridge</text>
      </g>

      <!-- Secondary row below — snap status -->
      <g transform="translate(0, 62)">
        <rect width="316" height="26" rx="13" fill="#1a1d2e" stroke="#252840"/>
        <circle cx="14" cy="13" r="4" fill="#34d399"/>
        <text x="28" y="13" font-size="11" fill="#a1a6c4" dominant-baseline="middle">
          <tspan>Canton Snap installed</tspan>
          <tspan fill="#656a8a"> · </tspan>
          <tspan font-family="JetBrains Mono, monospace">v0.2.0</tspan>
        </text>
        <text x="296" y="13" font-size="11" font-weight="600" fill="#00d4a4" text-anchor="end" dominant-baseline="middle">Manage</text>
      </g>
    </g>
  </g>

  <!-- ═══ Balances section ═══ -->
  <g transform="translate(96, 328)">
    <!-- Section header -->
    <text font-size="18" font-weight="700" fill="#f1f3f9">Balances</text>
    <g transform="translate(1140, 0)" text-anchor="end">
      <text x="64" y="10" font-size="12" fill="#656a8a" dominant-baseline="middle">Updated 12s ago</text>
      <g transform="translate(78, 0)" stroke="#a1a6c4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10 A7 7 0 1 0 5 4 L3 6 M3 2 V6 H7"/>
      </g>
    </g>

    <!-- Asset rows -->
    <g transform="translate(0, 32)">
      <rect width="1248" height="248" rx="16" fill="url(#cardBg)" stroke="#252840"/>

      <!-- USDCx -->
      <g transform="translate(0, 0)">
        <g transform="translate(32, 24)">
          <circle cx="20" cy="20" r="20" fill="#2775ca"/>
          <text x="20" y="20" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">$</text>
        </g>
        <text x="88" y="36" font-size="16" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">USDCx</text>
        <text x="88" y="56" font-size="12" fill="#656a8a" dominant-baseline="middle">USD Coin (Canton)</text>

        <!-- Amount -->
        <text x="1160" y="36" font-size="20" font-weight="700" font-family="JetBrains Mono, monospace" fill="#f1f3f9" text-anchor="end" dominant-baseline="middle">1,250.00</text>
        <text x="1160" y="58" font-size="11" fill="#656a8a" text-anchor="end" dominant-baseline="middle">≈ $1,250.00</text>

        <!-- Row actions -->
        <g transform="translate(1186, 28)" stroke="#a1a6c4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="1"/>
          <circle cx="10" cy="15" r="1"/>
          <circle cx="10" cy="20" r="1"/>
        </g>

        <line x1="32" y1="80" x2="1216" y2="80" stroke="#252840"/>
      </g>

      <!-- DEMO -->
      <g transform="translate(0, 80)">
        <g transform="translate(32, 24)">
          <circle cx="20" cy="20" r="20" fill="#00d4a4"/>
          <text x="20" y="20" font-size="11" font-weight="700" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">D</text>
        </g>
        <text x="88" y="36" font-size="16" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">DEMO</text>
        <text x="88" y="56" font-size="12" fill="#656a8a" dominant-baseline="middle">Demo Token</text>

        <text x="1160" y="36" font-size="20" font-weight="700" font-family="JetBrains Mono, monospace" fill="#f1f3f9" text-anchor="end" dominant-baseline="middle">4,500.25</text>
        <text x="1160" y="58" font-size="11" fill="#656a8a" text-anchor="end" dominant-baseline="middle">testnet · no USD value</text>

        <g transform="translate(1186, 28)" stroke="#a1a6c4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="1"/>
          <circle cx="10" cy="15" r="1"/>
          <circle cx="10" cy="20" r="1"/>
        </g>

        <line x1="32" y1="80" x2="1216" y2="80" stroke="#252840"/>
      </g>

      <!-- PROMPT -->
      <g transform="translate(0, 160)">
        <g transform="translate(32, 24)">
          <circle cx="20" cy="20" r="20" fill="#8b7cff"/>
          <text x="20" y="20" font-size="11" font-weight="700" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">P</text>
        </g>
        <text x="88" y="36" font-size="16" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">PROMPT</text>
        <text x="88" y="56" font-size="12" fill="#656a8a" dominant-baseline="middle">Prompt Token</text>

        <text x="1160" y="36" font-size="20" font-weight="700" font-family="JetBrains Mono, monospace" fill="#f1f3f9" text-anchor="end" dominant-baseline="middle">78</text>
        <text x="1160" y="58" font-size="11" fill="#656a8a" text-anchor="end" dominant-baseline="middle">testnet · no USD value</text>

        <g transform="translate(1186, 28)" stroke="#a1a6c4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="1"/>
          <circle cx="10" cy="15" r="1"/>
          <circle cx="10" cy="20" r="1"/>
        </g>
      </g>
    </g>
  </g>

  <!-- ═══ Activity section ═══ -->
  <g transform="translate(96, 672)">
    <text font-size="18" font-weight="700" fill="#f1f3f9">Recent activity</text>
    <text x="1204" y="10" font-size="12" font-weight="600" fill="#00d4a4" text-anchor="end" dominant-baseline="middle">View all →</text>

    <g transform="translate(0, 32)">
      <rect width="1248" height="264" rx="16" fill="url(#cardBg)" stroke="#252840"/>

      <!-- Row 1: Received -->
      <g transform="translate(0, 0)">
        <g transform="translate(32, 28)">
          <circle cx="16" cy="16" r="16" fill="#34d399" fill-opacity="0.14"/>
          <path d="M16 8 V24 M9 17 L16 24 L23 17" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>
        <text x="88" y="38" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Received 100 DEMO</text>
        <text x="88" y="56" font-size="12" font-family="JetBrains Mono, monospace" fill="#656a8a" dominant-baseline="middle">from 0xabcd…1234</text>
        <text x="1216" y="38" font-size="14" font-weight="700" font-family="JetBrains Mono, monospace" fill="#34d399" text-anchor="end" dominant-baseline="middle">+100.00</text>
        <text x="1216" y="56" font-size="11" fill="#656a8a" text-anchor="end" dominant-baseline="middle">2h ago</text>
        <line x1="32" y1="80" x2="1216" y2="80" stroke="#252840"/>
      </g>

      <!-- Row 2: Sent -->
      <g transform="translate(0, 80)">
        <g transform="translate(32, 28)">
          <circle cx="16" cy="16" r="16" fill="#ff6b6b" fill-opacity="0.12"/>
          <path d="M16 24 V8 M9 15 L16 8 L23 15" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>
        <text x="88" y="38" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Sent 50 USDCx</text>
        <text x="88" y="56" font-size="12" font-family="JetBrains Mono, monospace" fill="#656a8a" dominant-baseline="middle">to 0xdef0…5678</text>
        <text x="1216" y="38" font-size="14" font-weight="700" font-family="JetBrains Mono, monospace" fill="#ff6b6b" text-anchor="end" dominant-baseline="middle">−50.00</text>
        <text x="1216" y="56" font-size="11" fill="#656a8a" text-anchor="end" dominant-baseline="middle">1d ago</text>
        <line x1="32" y1="80" x2="1216" y2="80" stroke="#252840"/>
      </g>

      <!-- Row 3: Registered -->
      <g transform="translate(0, 160)">
        <g transform="translate(32, 28)">
          <circle cx="16" cy="16" r="16" fill="#00d4a4" fill-opacity="0.15"/>
          <path d="M9 17 L14 22 L24 11" stroke="#00d4a4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>
        <text x="88" y="38" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Registered party</text>
        <text x="88" y="56" font-size="12" fill="#656a8a" dominant-baseline="middle">Non-custodial · canton_signTopology</text>
        <text x="1216" y="38" font-size="12" fill="#a1a6c4" text-anchor="end" dominant-baseline="middle">—</text>
        <text x="1216" y="56" font-size="11" fill="#656a8a" text-anchor="end" dominant-baseline="middle">3d ago</text>
      </g>
    </g>
  </g>
</svg>
