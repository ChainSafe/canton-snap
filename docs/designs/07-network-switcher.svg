<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="orbBrand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4a4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00d4a4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#12141f"/>
    </linearGradient>
    <linearGradient id="ctaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0b8"/>
      <stop offset="100%" stop-color="#00d4a4"/>
    </linearGradient>
    <filter id="menuShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dy="8" result="shadow"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="#0a0b14"/>
  <circle cx="720" cy="560" r="420" fill="url(#orbBrand)"/>

  <!-- ═══ Dimmed backdrop ═══ -->
  <g opacity="0.35">
    <g transform="translate(96, 40)">
      <rect width="32" height="32" rx="8" fill="url(#ctaFill)"/>
      <path d="M10 16 L14 20 L22 12" stroke="#0a0b14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="48" y="16" font-size="14" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Canton dApp</text>
    </g>

    <text x="720" y="180" font-size="36" font-weight="700" fill="#f1f3f9" text-anchor="middle" letter-spacing="-0.6">Choose how to manage your Canton key</text>
    <text x="720" y="216" font-size="15" fill="#a1a6c4" text-anchor="middle">Same custodial vs self-custody choice you know from EVM.</text>

    <rect x="240" y="300" width="460" height="360" rx="16" fill="url(#cardBg)" stroke="#252840"/>
    <rect x="740" y="300" width="460" height="360" rx="16" fill="url(#cardBg)" stroke="#252840"/>
  </g>

  <!-- ═══ Header pills ═══ -->

  <!-- Network pill (ACTIVE — amber border) -->
  <g transform="translate(1056, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#ffb84d" stroke-opacity="0.55"/>
    <circle cx="14" cy="16" r="5" fill="#ffb84d"/>
    <text x="28" y="16" font-size="12" font-weight="500" fill="#f1f3f9" dominant-baseline="middle">Canton Devnet</text>
    <!-- caret up (open) -->
    <path d="M116 15 L120 11 L124 15" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wallet chip (inactive) -->
  <g transform="translate(1204, 40)">
    <rect width="140" height="32" rx="8" fill="#1a1d2e" stroke="#353a5a"/>
    <circle cx="14" cy="16" r="4" fill="#34d399"/>
    <text x="26" y="16" font-size="12" font-family="JetBrains Mono, monospace" fill="#f1f3f9" dominant-baseline="middle">0x742d…4B9e</text>
    <path d="M116 13 L120 17 L124 13" stroke="#a1a6c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ═══ Network switcher dropdown (anchored to network pill) ═══ -->
  <g transform="translate(1028, 84)" filter="url(#menuShadow)">
    <rect width="288" height="236" rx="14" fill="#12141f" stroke="#353a5a"/>

    <!-- Header -->
    <g transform="translate(20, 20)">
      <text font-size="11" font-weight="600" letter-spacing="1.2" fill="#656a8a">SWITCH NETWORK</text>
    </g>

    <!-- Canton Mainnet -->
    <g transform="translate(12, 48)">
      <rect width="264" height="48" rx="10" fill="transparent"/>
      <circle cx="22" cy="24" r="7" fill="#34d399"/>
      <circle cx="22" cy="24" r="7" fill="#34d399" fill-opacity="0.2" stroke="#34d399" stroke-opacity="0.3" stroke-width="1" transform="scale(1.6) translate(-8.25 -9)"/>
      <text x="40" y="18" font-size="13" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Canton Mainnet</text>
      <text x="40" y="34" font-size="10" fill="#656a8a" dominant-baseline="middle">mainnet.canton.network</text>
    </g>

    <!-- Canton Devnet (selected) -->
    <g transform="translate(12, 104)">
      <rect width="264" height="48" rx="10" fill="#ffb84d" fill-opacity="0.08" stroke="#ffb84d" stroke-opacity="0.3"/>
      <circle cx="22" cy="24" r="7" fill="#ffb84d"/>
      <text x="40" y="18" font-size="13" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">Canton Devnet</text>
      <text x="40" y="34" font-size="10" fill="#656a8a" dominant-baseline="middle">devnet.canton.network</text>
      <!-- Checkmark -->
      <g transform="translate(236, 16)" stroke="#ffb84d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8 L6 12 L14 4"/>
      </g>
    </g>

    <!-- Canton Local -->
    <g transform="translate(12, 160)">
      <rect width="264" height="48" rx="10" fill="transparent"/>
      <circle cx="22" cy="24" r="7" fill="#60a5fa"/>
      <text x="40" y="18" font-size="13" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">Canton Local</text>
      <text x="40" y="34" font-size="10" fill="#656a8a" dominant-baseline="middle">http://localhost:8081</text>
    </g>
  </g>
</svg>
