<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <!-- ═══ Backdrop + glow orbs ═══ -->
  <defs>
    <radialGradient id="orbBrand" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4a4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4a4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbCoral" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#12141f"/>
    </linearGradient>
    <linearGradient id="ctaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0b8"/>
      <stop offset="100%" stop-color="#00d4a4"/>
    </linearGradient>
    <linearGradient id="heroText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b6bcd9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="0" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1440" height="900" fill="#0a0b14"/>

  <!-- Ambient orbs -->
  <circle cx="1150" cy="280" r="340" fill="url(#orbBrand)"/>
  <circle cx="180" cy="700" r="280" fill="url(#orbCoral)"/>

  <!-- Fine grid overlay for texture (very subtle) -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <path d="M0 200 H1440 M0 400 H1440 M0 600 H1440 M0 800 H1440"/>
    <path d="M240 0 V900 M480 0 V900 M720 0 V900 M960 0 V900 M1200 0 V900"/>
  </g>

  <!-- ═══ Navigation bar ═══ -->
  <g transform="translate(0, 0)">
    <rect width="1440" height="72" fill="#0a0b14" fill-opacity="0.8"/>
    <line x1="0" y1="72" x2="1440" y2="72" stroke="#252840" stroke-width="1"/>

    <!-- Logo mark -->
    <g transform="translate(96, 24)">
      <rect x="0" y="0" width="32" height="32" rx="8" fill="url(#ctaFill)"/>
      <path d="M10 16 L14 20 L22 12" stroke="#0a0b14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="48" y="15" font-size="15" font-weight="700" fill="#f1f3f9" dominant-baseline="middle">Canton Snap</text>
      <text x="48" y="28" font-size="11" fill="#656a8a" dominant-baseline="middle">by ChainSafe</text>
    </g>

    <!-- Nav links -->
    <g transform="translate(1044, 36)" font-size="13" fill="#a1a6c4" dominant-baseline="middle">
      <text x="0" y="0">Docs</text>
      <text x="60" y="0">GitHub</text>
      <text x="140" y="0">Discord</text>
    </g>

    <!-- Nav CTA (ghost) -->
    <g transform="translate(1236, 20)">
      <rect width="112" height="32" rx="8" fill="none" stroke="#353a5a" stroke-width="1"/>
      <text x="56" y="16" font-size="12" font-weight="600" fill="#f1f3f9" text-anchor="middle" dominant-baseline="middle">Launch App</text>
    </g>
  </g>

  <!-- ═══ Hero section ═══ -->
  <g transform="translate(96, 140)">
    <!-- Eyebrow badge -->
    <g>
      <rect x="0" y="0" width="248" height="28" rx="14" fill="#00d4a4" fill-opacity="0.12" stroke="#00d4a4" stroke-opacity="0.3"/>
      <circle cx="14" cy="14" r="3" fill="#00d4a4"/>
      <text x="26" y="14" font-size="11" font-weight="600" letter-spacing="1.5" fill="#00d4a4" dominant-baseline="middle">POWERED BY METAMASK SNAP</text>
    </g>

    <!-- Hero headline -->
    <text x="0" y="90" font-size="64" font-weight="800" fill="url(#heroText)" letter-spacing="-1.5">Your keys.</text>
    <text x="0" y="160" font-size="64" font-weight="800" fill="url(#heroText)" letter-spacing="-1.5">Your Canton party.</text>

    <!-- Hero description -->
    <text x="0" y="210" font-size="17" fill="#a1a6c4" letter-spacing="-0.2">Non-custodial signing for Canton Network, powered by MetaMask.</text>
    <text x="0" y="234" font-size="17" fill="#a1a6c4" letter-spacing="-0.2">Your secp256k1 private key is derived inside the snap — never exposed,</text>
    <text x="0" y="258" font-size="17" fill="#a1a6c4" letter-spacing="-0.2">never persisted, never leaves MetaMask.</text>

    <!-- CTA row -->
    <g transform="translate(0, 310)">
      <!-- Primary CTA -->
      <g filter="url(#glow)">
        <rect width="220" height="52" rx="26" fill="url(#ctaFill)"/>
      </g>
      <g transform="translate(20, 14)">
        <circle cx="12" cy="12" r="12" fill="#0a0b14" fill-opacity="0.15"/>
        <path d="M5 10 L10 7 L19 13 L17 18 L10 16 Z" fill="#0a0b14"/>
      </g>
      <text x="56" y="26" font-size="15" font-weight="700" fill="#0a0b14" dominant-baseline="middle">Connect MetaMask</text>
      <text x="186" y="26" font-size="16" fill="#0a0b14" dominant-baseline="middle">→</text>

      <!-- Secondary link -->
      <text x="252" y="26" font-size="14" font-weight="500" fill="#a1a6c4" dominant-baseline="middle">Install MetaMask Flask</text>
      <text x="395" y="26" font-size="13" fill="#00d4a4" dominant-baseline="middle">↗</text>
    </g>

    <!-- Trust line -->
    <g transform="translate(0, 400)" font-size="12" fill="#656a8a" dominant-baseline="middle">
      <circle cx="3" cy="0" r="2.5" fill="#00d4a4"/>
      <text x="14" y="0">MetaMask Flask</text>

      <circle cx="125" cy="0" r="2.5" fill="#00d4a4"/>
      <text x="136" y="0">secp256k1 EC_DSA</text>

      <circle cx="270" cy="0" r="2.5" fill="#00d4a4"/>
      <text x="281" y="0">Open source</text>

      <circle cx="372" cy="0" r="2.5" fill="#00d4a4"/>
      <text x="383" y="0">Audit-friendly</text>
    </g>
  </g>

  <!-- ═══ Right-side product preview card ═══ -->
  <g transform="translate(810, 140)">
    <!-- Card shadow -->
    <rect x="4" y="8" width="540" height="420" rx="20" fill="#000" fill-opacity="0.4"/>
    <!-- Main card -->
    <rect width="540" height="420" rx="20" fill="url(#cardBg)" stroke="#252840" stroke-width="1"/>

    <!-- MetaMask mock header -->
    <rect x="24" y="24" width="492" height="52" rx="12" fill="#232640"/>
    <g transform="translate(40, 36)">
      <rect width="28" height="28" rx="6" fill="#ff9c4a"/>
      <path d="M6 8 L14 2 L22 8 L22 20 L14 26 L6 20 Z" fill="#f6851b" stroke="#fff" stroke-width="0.5"/>
    </g>
    <text x="80" y="50" font-size="13" font-weight="600" fill="#f1f3f9" dominant-baseline="middle">MetaMask Flask · Canton Snap</text>
    <circle cx="488" cy="50" r="4" fill="#34d399"/>
    <text x="498" y="50" font-size="11" fill="#a1a6c4" dominant-baseline="middle">Connected</text>

    <!-- Dialog title -->
    <text x="40" y="118" font-size="18" font-weight="700" fill="#f1f3f9">Sign Canton Transaction</text>

    <!-- Section: Operation -->
    <g transform="translate(40, 146)">
      <text font-size="11" font-weight="600" letter-spacing="1" fill="#656a8a">OPERATION</text>
      <rect y="12" width="460" height="44" rx="8" fill="#0a0b14" stroke="#252840"/>
      <text x="14" y="34" font-size="13" font-weight="600" fill="#f1f3f9">Transfer</text>
      <text x="14" y="50" font-size="11" fill="#a1a6c4">100.00 DEMO → 0xabcd…1234</text>
      <rect x="380" y="14" width="66" height="20" rx="10" fill="#00d4a4" fill-opacity="0.12"/>
      <text x="413" y="24" font-size="10" font-weight="600" fill="#00d4a4" text-anchor="middle">TRANSFER</text>
    </g>

    <!-- Section: Hash -->
    <g transform="translate(40, 218)">
      <text font-size="11" font-weight="600" letter-spacing="1" fill="#656a8a">HASH TO SIGN</text>
      <rect y="12" width="460" height="56" rx="8" fill="#0a0b14" stroke="#252840"/>
      <text x="14" y="30" font-size="11" font-family="JetBrains Mono, monospace" fill="#f1f3f9">a7f3c2b1...8e92f5d4</text>
      <text x="14" y="50" font-size="10" fill="#656a8a">32 bytes · SHA-256 of Canton MultiHash</text>
      <rect x="410" y="36" width="40" height="20" rx="4" fill="#232640"/>
      <text x="430" y="46" font-size="10" fill="#a1a6c4" text-anchor="middle">Copy</text>
    </g>

    <!-- Action buttons -->
    <g transform="translate(40, 328)">
      <rect width="222" height="46" rx="10" fill="#232640" stroke="#353a5a"/>
      <text x="111" y="23" font-size="13" font-weight="600" fill="#a1a6c4" text-anchor="middle" dominant-baseline="middle">Reject</text>

      <rect x="238" y="0" width="222" height="46" rx="10" fill="url(#ctaFill)"/>
      <text x="349" y="23" font-size="13" font-weight="700" fill="#0a0b14" text-anchor="middle" dominant-baseline="middle">Approve &amp; Sign</text>
    </g>
  </g>

  <!-- ═══ Feature cards ═══ -->
  <g transform="translate(96, 620)">
    <!-- Card 1 -->
    <g>
      <rect width="404" height="200" rx="16" fill="url(#cardBg)" stroke="#252840"/>
      <g transform="translate(24, 24)">
        <rect width="44" height="44" rx="10" fill="#00d4a4" fill-opacity="0.12"/>
        <path d="M22 10 L13 16 V23 C13 28 17 32 22 34 C27 32 31 28 31 23 V16 Z" fill="none" stroke="#00d4a4" stroke-width="2" stroke-linejoin="round"/>
      </g>
      <text x="24" y="104" font-size="18" font-weight="700" fill="#f1f3f9">Non-custodial</text>
      <text x="24" y="136" font-size="13" fill="#a1a6c4">Private keys are derived deterministically</text>
      <text x="24" y="156" font-size="13" fill="#a1a6c4">from your MetaMask seed and never persist</text>
      <text x="24" y="176" font-size="13" fill="#a1a6c4">to disk or leave the snap sandbox.</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(422, 0)">
      <rect width="404" height="200" rx="16" fill="url(#cardBg)" stroke="#252840"/>
      <g transform="translate(24, 24)">
        <rect width="44" height="44" rx="10" fill="#ffb84d" fill-opacity="0.12"/>
        <path d="M13 22 L18 14 L22 22 L27 18 L31 26" stroke="#ffb84d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>
      <text x="24" y="104" font-size="18" font-weight="700" fill="#f1f3f9">Canton-native signing</text>
      <text x="24" y="136" font-size="13" fill="#a1a6c4">ECDSA with SHA-256 prehash + DER</text>
      <text x="24" y="156" font-size="13" fill="#a1a6c4">encoding — matches EC_DSA_SHA_256 and</text>
      <text x="24" y="176" font-size="13" fill="#a1a6c4">CantonKeyPair.SignDER() bit-for-bit.</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(844, 0)">
      <rect width="404" height="200" rx="16" fill="url(#cardBg)" stroke="#252840"/>
      <g transform="translate(24, 24)">
        <rect width="44" height="44" rx="10" fill="#ff6b6b" fill-opacity="0.12"/>
        <path d="M22 12 L22 22 M22 24 L22 32 M14 16 L30 16 M14 28 L30 28" stroke="#ff6b6b" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="22" cy="22" r="10" stroke="#ff6b6b" stroke-width="2" fill="none"/>
      </g>
      <text x="24" y="104" font-size="18" font-weight="700" fill="#f1f3f9">Transparent &amp; auditable</text>
      <text x="24" y="136" font-size="13" fill="#a1a6c4">Open source under MIT. Every signature</text>
      <text x="24" y="156" font-size="13" fill="#a1a6c4">requires an explicit user confirmation via</text>
      <text x="24" y="176" font-size="13" fill="#a1a6c4">the snap's native dialog UI.</text>
    </g>
  </g>
</svg>
